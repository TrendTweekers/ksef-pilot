# Shopify app configuration.
#
# Purpose of this file today: declare the MANDATORY COMPLIANCE (GDPR) webhooks,
# which cannot be registered through the Admin API and must be set at the app
# level (here, or in the Partner/Dev Dashboard). The app's operational webhooks
# (app/uninstalled, app_subscriptions/update, refunds/create, orders/edited,
# orders/updated) are registered per-shop at install time by registerCoreWebhooks,
# so they are intentionally NOT duplicated here.
#
# To apply (this app's config is version-managed in the Shopify dev dashboard):
#   1. Run `shopify app config link` to bind this file to the existing app
#      (client_id below is already set to the app's public Client ID).
#   2. Run `shopify app deploy` to publish a new version with these compliance
#      webhook subscriptions.
#   (Alternatively, add the same three compliance topic URLs via the dashboard's
#   "New version" config editor.)

client_id = "4d7ce83df74d40c9af9b6c05f333320f"
name = "KSeF Pilot"
handle = "ksef-pilot"
application_url = "https://ksef-pilot-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_orders,read_customers,read_products"
# Shopify managed installation (pairs with token exchange; avoids the legacy
# OAuth authorization-code install that triggers the deprecated-token warning).
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://ksef-pilot-production.up.railway.app/auth/callback"
]

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "https://ksef-pilot-production.up.railway.app/webhooks/shopify"
